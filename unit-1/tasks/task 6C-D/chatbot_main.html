<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Chatbot</title>
</head>
<body>

<h2>Healthcare Assistant Chatbot</h2>

<input type="text" id="userInput" placeholder="Ask a question..." style="width:300px;">
<button onclick="sendMessage()">Send</button>

<p><strong>Bot:</strong> <span id="response"></span></p>

<script>
async function sendMessage() {
    const userQuestion = document.getElementById("userInput").value;

    const response = await fetch("ENDPOINT HERE", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Ocp-Apim-Subscription-Key": "KEY HERE"
        },
		body: JSON.stringify({
			question: userQuestion
		})
    });

    const data = await response.json();

    document.getElementById("response").innerText = data.answers[0].answer;
}
</script>

</body>
</html>
